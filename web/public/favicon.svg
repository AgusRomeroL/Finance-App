  <path fill="#5BA981" d="M46.75,26.38 Q54.00,23.00 61.25,26.38 L76.75,33.62 Q84.00,37.00 76.75,40.38 L61.25,47.62 Q54.00,51.00 46.75,47.62 L31.25,40.38 Q24.00,37.00 31.25,33.62 L46.75,26.38 Z"/>
  <!-- Capa media, verde medio -->
